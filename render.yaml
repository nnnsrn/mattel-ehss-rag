services:
  - type: web
    name: ehss-rag-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false   # set manually in Render dashboard, not committed to repo
    disk:
      name: chroma-db
      mountPath: /app/chroma_db
      sizeGB: 1